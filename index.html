<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 Fluffy Demonlist 🐾</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #1e1e2e; /* Deep Space Furry Blue */
            font-family: 'Quicksand', sans-serif;
            color: #f8f8f2;
        }
        .paw-card {
            background: rgba(255, 121, 198, 0.1);
            backdrop-filter: blur(8px);
            border: 3px solid #ff79c6; /* Pinky accent */
            border-radius: 25px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .paw-card:hover {
            transform: scale(1.05) rotate(1deg);
            background: rgba(255, 121, 198, 0.2);
            box-shadow: 0 0 20px rgba(255, 121, 198, 0.4);
        }
        .gradient-text {
            background: linear-gradient(90deg, #ff79c6, #bd93f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Custom Scrollbar for the fluffiness */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #282a36; }
        ::-webkit-scrollbar-thumb { background: #ff79c6; border-radius: 10px; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-6xl font-bold mb-2">🐾 <span class="gradient-text">Furry List</span> 🐾</h1>
            <p class="text-purple-300">Die härtesten Demons, präsentiert von deiner lokalen Flausch-Einheit!</p>
            
            <div class="mt-8 flex justify-center">
                <input type="text" id="searchInput" placeholder="Suche nach einem Level... OwO" 
                    class="px-6 py-3 rounded-full bg-slate-800 border-2 border-purple-500 focus:outline-none focus:ring-2 focus:ring-pink-400 w-full max-w-md text-white">
            </div>
        </header>

        <div id="stats" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10 text-center">
            </div>

        <div id="demon-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-8">
            <div id="loading" class="col-span-full text-center py-20 text-2xl animate-bounce">
                Lädt die Liste... einen Moment Geduld! *purr* 🐱
            </div>
        </div>
    </div>

    <script>
        const demonContainer = document.getElementById('demon-list');
        const searchInput = document.getElementById('searchInput');
        let allDemons = [];

        async function initList() {
            try {
                // Wir holen die Top 100 für eine "komplette" Liste
                const response = await fetch('https://pointercrate.com/api/v2/demons/?limit=100');
                allDemons = await response.json();
                
                displayDemons(allDemons);
                renderStats(allDemons);

                // Such-Funktion hinzufügen
                searchInput.addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = allDemons.filter(d => 
                        d.name.toLowerCase().includes(term) || 
                        d.publisher.name.toLowerCase().includes(term)
                    );
                    displayDemons(filtered);
                });

            } catch (err) {
                demonContainer.innerHTML = "<p class='text-red-400 text-center col-span-full'>Oh nein! Die API macht ein Nickerchen. qwq</p>";
            }
        }

        function renderStats(demons) {
            const statsDiv = document.getElementById('stats');
            statsDiv.innerHTML = `
                <div class="bg-slate-800 p-4 rounded-2xl border-b-4 border-pink-500">
                    <div class="text-pink-400 font-bold">Total Demons</div>
                    <div class="text-2xl">${demons.length}</div>
                </div>
                <div class="bg-slate-800 p-4 rounded-2xl border-b-4 border-purple-500">
                    <div class="text-purple-400 font-bold">Top One</div>
                    <div class="text-2xl">${demons[0].name}</div>
                </div>
                <div class="bg-slate-800 p-4 rounded-2xl border-b-4 border-blue-500">
                    <div class="text-blue-400 font-bold">Vibe Check</div>
                    <div class="text-2xl">100% Fluffy</div>
                </div>
            `;
        }

        function displayDemons(demons) {
            document.getElementById('loading').style.display = 'none';
            demonContainer.innerHTML = '';

            demons.forEach(demon => {
                const card = document.createElement('div');
                card.className = 'paw-card p-6 flex items-center gap-6';
                
                // YouTube Thumbnail (mqdefault für Geschwindigkeit)
                const thumb = `https://img.youtube.com/vi/${demon.video_id}/mqdefault.jpg`;

                card.innerHTML = `
                    <div class="relative flex-shrink-0">
                        <img src="${thumb}" class="w-32 h-20 object-cover rounded-xl border-2 border-pink-400" alt="Demon Thumb">
                        <div class="absolute -top-3 -left-3 bg-pink-500 text-white font-bold px-2 py-1 rounded-lg text-xs shadow-lg">
                            #${demon.position}
                        </div>
                    </div>
                    <div class="flex-grow">
                        <h2 class="text-xl font-bold text-pink-200">${demon.name}</h2>
                        <p class="text-sm text-gray-400">Veröffentlicht von <span class="text-purple-300">${demon.publisher.name}</span></p>
                    </div>
                    <a href="https://pointercrate.com/demonlist/${demon.position}/" target="_blank" class="text-2xl hover:scale-125 transition">
                        🐾
                    </a>
                `;
                demonContainer.appendChild(card);
            });

            if(demons.length === 0) {
                demonContainer.innerHTML = "<p class='col-span-full text-center py-10'>Nichts gefunden... trauriges Jaulen. ;w;</p>";
            }
        }

        initList();
    </script>
</body>
</html>
