<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ðŸ¾ Rechner</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body.furry {
      --bg1: #fdf3e7;
      --bg2: #fde68a55;
      --bg3: #f9a8d455;
      --title-color: #8b5e3c;
      --title-shadow: #f4a26155;
      --subtitle-color: #a0704a;
      --ear-color: #8b5e3c;
      --ear-inner: #f9a8d4;
      --calc-bg1: #fff8f0;
      --calc-bg2: #fef3e2;
      --calc-border: #8b5e3c;
      --display-bg1: #3d1f0a;
      --display-bg2: #6b3a1f;
      --display-expr: #c9956a;
      --display-result: #fdf3e7;
      --num-bg1: #fff4e8;
      --num-bg2: #ffe8cc;
      --num-color: #3d1f0a;
      --num-shadow: #d4955a;
      --num-hover1: #fff8f0;
      --num-hover2: #ffd8a8;
      --op-bg1: #f4a261;
      --op-bg2: #e07d3a;
      --op-shadow: #b5581a;
      --op-hover1: #f5b068;
      --eq-bg1: #8b5e3c;
      --eq-bg2: #6b3a1f;
      --eq-shadow: #2d1205;
      --eq-color: #fdf3e7;
      --clear-bg1: #fda4af;
      --clear-bg2: #fb7185;
      --clear-shadow: #d4405a;
      --special-bg1: #c4b5fd;
      --special-bg2: #a78bfa;
      --special-shadow: #7c3aed;
      --footer-color: #b07848;
      --toggle-bg: linear-gradient(135deg, #f472b6, #a78bfa);
      --nose-show: block;
    }

    body.femboy {
      --bg1: #fff0f8;
      --bg2: #fce7f366;
      --bg3: #e0e7ff55;
      --title-color: #be185d;
      --title-shadow: #f9a8d455;
      --subtitle-color: #db2777;
      --ear-color: #f472b6;
      --ear-inner: #e0e7ff;
      --calc-bg1: #fff5fb;
      --calc-bg2: #fce7f3;
      --calc-border: #f472b6;
      --display-bg1: #831843;
      --display-bg2: #9d174d;
      --display-expr: #f9a8d4;
      --display-result: #fff0f8;
      --num-bg1: #fdf2f8;
      --num-bg2: #fce7f3;
      --num-color: #831843;
      --num-shadow: #f472b6;
      --num-hover1: #fdf4ff;
      --num-hover2: #fae8ff;
      --op-bg1: #f472b6;
      --op-bg2: #ec4899;
      --op-shadow: #be185d;
      --op-hover1: #f9a8d4;
      --eq-bg1: #a855f7;
      --eq-bg2: #9333ea;
      --eq-shadow: #6b21a8;
      --eq-color: #fdf4ff;
      --clear-bg1: #a5f3fc;
      --clear-bg2: #67e8f9;
      --clear-shadow: #0e7490;
      --special-bg1: #c4b5fd;
      --special-bg2: #a78bfa;
      --special-shadow: #7c3aed;
      --footer-color: #db2777;
      --toggle-bg: linear-gradient(135deg, #8b5e3c, #f4a261);
      --nose-show: none;
    }

    body {
      min-height: 100vh;
      background: var(--bg1);
      background-image:
        radial-gradient(circle at 20% 20%, var(--bg2) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, var(--bg3) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      padding: 20px;
      transition: background 0.5s;
    }

    .bg-float {
      position: fixed; pointer-events: none;
      opacity: 0.07; font-size: 2.8rem;
      animation: floatUp linear infinite; z-index: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); }
      100% { transform: translateY(-10vh) rotate(360deg); }
    }

    /* â”€â”€ Toggle button â”€â”€ */
    .theme-toggle {
      position: relative; z-index: 10;
      margin-bottom: 18px;
      background: var(--toggle-bg);
      border: none; border-radius: 999px;
      padding: 11px 26px;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem; color: white;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
      transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
      letter-spacing: 0.5px;
    }
    .theme-toggle:hover { transform: scale(1.07); }
    .theme-toggle:active { transform: scale(0.94); }

    .title-area {
      text-align: center; margin-bottom: 20px;
      position: relative; z-index: 1;
    }
    .title-area h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.6rem;
      color: var(--title-color);
      text-shadow: 3px 3px 0 var(--title-shadow);
      transition: color 0.4s, text-shadow 0.4s;
    }
    .title-area p {
      color: var(--subtitle-color);
      font-size: 0.95rem; font-weight: 700;
      margin-top: 4px; transition: color 0.4s;
    }

    .ears {
      display: flex; justify-content: space-between;
      width: 290px; margin-bottom: -18px;
      position: relative; z-index: 2;
    }
    .ear {
      width: 56px; height: 56px;
      background: var(--ear-color);
      border-radius: 50% 50% 0 50%;
      position: relative;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      transition: background 0.4s;
    }
    .ear.right { border-radius: 50% 50% 50% 0; }
    .ear::after {
      content: ''; position: absolute;
      width: 32px; height: 32px;
      background: var(--ear-inner);
      border-radius: 50% 50% 0 50%;
      top: 10px; left: 10px;
      transition: background 0.4s;
    }
    .ear.right::after { border-radius: 50% 50% 50% 0; }

    .calculator {
      background: linear-gradient(145deg, var(--calc-bg1), var(--calc-bg2));
      border-radius: 28px; padding: 24px; width: 290px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 0 0 4px var(--calc-border), inset 0 1px 0 rgba(255,255,255,0.8);
      position: relative; z-index: 1;
      transition: background 0.4s, box-shadow 0.4s;
    }

    .nose {
      position: absolute; top: -13px; left: 50%;
      transform: translateX(-50%);
      font-size: 1.4rem; display: var(--nose-show);
      line-height: 1;
    }

    .display {
      background: linear-gradient(135deg, var(--display-bg1), var(--display-bg2));
      border-radius: 16px; padding: 14px 16px;
      margin-bottom: 16px; min-height: 86px;
      display: flex; flex-direction: column;
      justify-content: flex-end; align-items: flex-end;
      box-shadow: inset 0 4px 16px rgba(0,0,0,0.4);
      overflow: hidden; position: relative;
      transition: background 0.4s;
    }
    .display .expression {
      color: var(--display-expr);
      font-size: 0.82rem; font-weight: 600;
      min-height: 16px; word-break: break-all;
      transition: color 0.4s;
    }
    .display .result {
      color: var(--display-result);
      font-family: 'Fredoka One', cursive;
      font-size: 2.1rem; word-break: break-all;
      transition: transform 0.1s, color 0.4s;
    }
    .display .result.pop { transform: scale(1.06); }

    .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px; }

    button.calc-btn {
      border: none; border-radius: 13px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.25rem; cursor: pointer; height: 55px;
      transition: all 0.12s cubic-bezier(.34,1.56,.64,1); outline: none;
    }
    button.calc-btn:active { transform: scale(0.90) translateY(2px); }

    .btn-num {
      background: linear-gradient(145deg, var(--num-bg1), var(--num-bg2));
      color: var(--num-color);
      box-shadow: 0 4px 0 var(--num-shadow), 0 5px 10px rgba(0,0,0,0.08);
      transition: background 0.4s, color 0.4s, box-shadow 0.4s, transform 0.12s;
    }
    .btn-num:hover { background: linear-gradient(145deg, var(--num-hover1), var(--num-hover2)); transform: translateY(-2px); }

    .btn-op {
      background: linear-gradient(145deg, var(--op-bg1), var(--op-bg2));
      color: white; box-shadow: 0 4px 0 var(--op-shadow), 0 5px 10px rgba(0,0,0,0.12);
      transition: background 0.4s, box-shadow 0.4s, transform 0.12s;
    }
    .btn-op:hover { background: linear-gradient(145deg, var(--op-hover1), var(--op-bg1)); transform: translateY(-2px); }

    .btn-eq {
      background: linear-gradient(145deg, var(--eq-bg1), var(--eq-bg2));
      color: var(--eq-color); font-size: 1.5rem;
      box-shadow: 0 4px 0 var(--eq-shadow), 0 5px 10px rgba(0,0,0,0.15);
      transition: background 0.4s, color 0.4s, box-shadow 0.4s, transform 0.12s;
    }
    .btn-eq:hover { transform: translateY(-2px); }

    .btn-clear {
      background: linear-gradient(145deg, var(--clear-bg1), var(--clear-bg2));
      color: white; font-size: 0.95rem;
      box-shadow: 0 4px 0 var(--clear-shadow), 0 5px 10px rgba(0,0,0,0.1);
      transition: background 0.4s, box-shadow 0.4s, transform 0.12s;
    }
    .btn-clear:hover { transform: translateY(-2px); }

    .btn-special {
      background: linear-gradient(145deg, var(--special-bg1), var(--special-bg2));
      color: white; font-size: 0.95rem;
      box-shadow: 0 4px 0 var(--special-shadow), 0 5px 10px rgba(0,0,0,0.1);
      transition: background 0.4s, box-shadow 0.4s, transform 0.12s;
    }
    .btn-special:hover { transform: translateY(-2px); }

    .btn-zero { grid-column: span 2; }

    .tail {
      position: absolute; bottom: -28px; right: 28px;
      font-size: 1.9rem;
      animation: wiggle 2s ease-in-out infinite;
      transform-origin: left center;
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(-15deg); }
      50%       { transform: rotate(15deg); }
    }

    .burst {
      position: fixed; font-size: 1.7rem;
      pointer-events: none;
      animation: burstAnim 0.55s ease-out forwards; z-index: 999;
    }
    @keyframes burstAnim {
      0%   { transform: scale(0) rotate(-20deg); opacity: 1; }
      60%  { transform: scale(1.3) rotate(10deg); opacity: 1; }
      100% { transform: scale(1.6) rotate(5deg) translateY(-28px); opacity: 0; }
    }

    .footer {
      margin-top: 22px; color: var(--footer-color);
      font-size: 0.8rem; font-weight: 700; z-index: 1;
      transition: color 0.4s;
    }
  </style>
</head>
<body class="furry">

  <span class="bg-float" id="f1" style="left:5%;  animation-duration:12s; animation-delay:0s">ðŸ¾</span>
  <span class="bg-float" id="f2" style="left:22%; animation-duration:9s;  animation-delay:3s">ðŸ¾</span>
  <span class="bg-float" id="f3" style="left:50%; animation-duration:14s; animation-delay:1s">ðŸ¾</span>
  <span class="bg-float" id="f4" style="left:75%; animation-duration:10s; animation-delay:5s">ðŸ¾</span>
  <span class="bg-float" id="f5" style="left:90%; animation-duration:11s; animation-delay:2s">ðŸ¾</span>

  <button class="theme-toggle" id="toggleBtn" onclick="toggleTheme()">ðŸŽ€ Femboy Mode</button>

  <div class="title-area">
    <h1 id="mainTitle">ðŸ¾ Furry Rechner</h1>
    <p  id="mainSub">Rechnen macht SpaÃŸ, arf arf! ðŸ¦Š</p>
  </div>

  <div class="ears">
    <div class="ear left"></div>
    <div class="ear right"></div>
  </div>

  <div class="calculator">
    <div class="nose" id="nose">ðŸ½</div>

    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result"     id="result">0</div>
    </div>

    <div class="buttons">
      <button class="calc-btn btn-clear"   onclick="clearAll(event)">AC</button>
      <button class="calc-btn btn-special" onclick="toggleSign(event)">+/âˆ’</button>
      <button class="calc-btn btn-special" onclick="percent(event)">%</button>
      <button class="calc-btn btn-op"      onclick="setOp('/',event)">Ã·</button>

      <button class="calc-btn btn-num" onclick="num('7',event)">7</button>
      <button class="calc-btn btn-num" onclick="num('8',event)">8</button>
      <button class="calc-btn btn-num" onclick="num('9',event)">9</button>
      <button class="calc-btn btn-op"  onclick="setOp('*',event)">Ã—</button>

      <button class="calc-btn btn-num" onclick="num('4',event)">4</button>
      <button class="calc-btn btn-num" onclick="num('5',event)">5</button>
      <button class="calc-btn btn-num" onclick="num('6',event)">6</button>
      <button class="calc-btn btn-op"  onclick="setOp('-',event)">âˆ’</button>

      <button class="calc-btn btn-num" onclick="num('1',event)">1</button>
      <button class="calc-btn btn-num" onclick="num('2',event)">2</button>
      <button class="calc-btn btn-num" onclick="num('3',event)">3</button>
      <button class="calc-btn btn-op"  onclick="setOp('+',event)">+</button>

      <button class="calc-btn btn-num btn-zero" onclick="num('0',event)">0</button>
      <button class="calc-btn btn-num"          onclick="dot(event)">.</button>
      <button class="calc-btn btn-eq"           onclick="calculate(event)">ï¼</button>
    </div>

    <div class="tail" id="tail">ðŸ¦Š</div>
  </div>

  <div class="footer" id="footer">Made with ðŸ¾ for furry fans</div>

  <script>
    let isFemboy = false;

    const T = {
      furry:  { btn:'ðŸŽ€ Femboy Mode', title:'ðŸ¾ Furry Rechner', sub:'Rechnen macht SpaÃŸ, arf arf! ðŸ¦Š', tail:'ðŸ¦Š', nose:'ðŸ½', footer:'Made with ðŸ¾ for furry fans',  floats:['ðŸ¾','ðŸ¦Š','ðŸº','ðŸ¦','ðŸ±'], bursts:['ðŸ¾','ðŸ¦Š','ðŸº','ðŸ¦','ðŸ±'] },
      femboy: { btn:'ðŸ¾ Furry Mode',  title:'ðŸŽ€ Femboy Rechner', sub:'Kawaii math time~ ðŸ’•âœ¨',          tail:'ðŸŽ€', nose:'ðŸŽ€', footer:'Made with ðŸ’• for femboy fans', floats:['ðŸŽ€','ðŸ’•','âœ¨','ðŸŒ¸','ðŸ’œ'], bursts:['ðŸŽ€','ðŸ’•','âœ¨','ðŸŒ¸','ðŸ’œ','ðŸ«§'] }
    };

    function toggleTheme() {
      isFemboy = !isFemboy;
      const t = isFemboy ? T.femboy : T.furry;
      document.body.className = isFemboy ? 'femboy' : 'furry';
      document.getElementById('toggleBtn').textContent = t.btn;
      document.getElementById('mainTitle').textContent = t.title;
      document.getElementById('mainSub').textContent   = t.sub;
      document.getElementById('tail').textContent      = t.tail;
      document.getElementById('nose').textContent      = t.nose;
      document.getElementById('footer').textContent    = t.footer;
      ['f1','f2','f3','f4','f5'].forEach((id,i) =>
        document.getElementById(id).textContent = t.floats[i % t.floats.length]);
    }

    // â”€â”€ Calc logic â”€â”€
    let current='0', stored=null, operator=null, justCalc=false, expression='';
    const resultEl=document.getElementById('result'), exprEl=document.getElementById('expression');

    function updateDisplay(){ resultEl.textContent=current; exprEl.textContent=expression; }

    function num(n,e){ spawn(e); if(justCalc){current=n;expression='';justCalc=false;}else current=current==='0'?n:current+n; updateDisplay(); }
    function dot(e){ spawn(e); if(justCalc){current='0.';justCalc=false;}else if(!current.includes('.'))current+='.'; updateDisplay(); }
    function setOp(op,e){
      spawn(e);
      const sym={'+':'+','-':'âˆ’','*':'Ã—','/':'Ã·'};
      if(stored!==null&&!justCalc) stored=parseFloat(eval(stored+operator+current).toFixed(10));
      else stored=parseFloat(current);
      operator=op; expression=stored+' '+sym[op]; justCalc=true; updateDisplay();
    }
    function calculate(e){
      spawn(e);
      if(stored===null||operator===null)return;
      const sym={'+':'+','-':'âˆ’','*':'Ã—','/':'Ã·'}, cur=parseFloat(current);
      if(operator==='/'&&cur===0){current='OwO Fehler!';stored=null;operator=null;expression='';updateDisplay();return;}
      const res=parseFloat(eval(stored+operator+cur).toFixed(10));
      expression=stored+' '+sym[operator]+' '+cur+' =';
      current=String(res); stored=null; operator=null; justCalc=true;
      resultEl.classList.add('pop'); setTimeout(()=>resultEl.classList.remove('pop'),150);
      updateDisplay();
    }
    function clearAll(e){ spawn(e); current='0';stored=null;operator=null;justCalc=false;expression=''; updateDisplay(); }
    function toggleSign(e){ spawn(e); current=String(parseFloat(current)*-1); updateDisplay(); }
    function percent(e){ spawn(e); current=String(parseFloat(current)/100); updateDisplay(); }

    function spawn(e){
      if(!e)return;
      const t=isFemboy?T.femboy:T.furry;
      const emoji=t.bursts[Math.floor(Math.random()*t.bursts.length)];
      const el=document.createElement('span'); el.className='burst'; el.textContent=emoji;
      const r=e.target.getBoundingClientRect();
      el.style.left=(r.left+r.width/2-14)+'px'; el.style.top=(r.top+r.height/2-14)+'px';
      document.body.appendChild(el); setTimeout(()=>el.remove(),650);
    }

    document.addEventListener('keydown',ev=>{
      const f={target:document.querySelector('.calculator'),getBoundingClientRect:()=>({left:150,top:400,width:0,height:0})};
      if(ev.key>='0'&&ev.key<='9') num(ev.key,f);
      else if(ev.key==='.') dot(f);
      else if(ev.key==='+') setOp('+',f);
      else if(ev.key==='-') setOp('-',f);
      else if(ev.key==='*') setOp('*',f);
      else if(ev.key==='/'){ev.preventDefault();setOp('/',f);}
      else if(ev.key==='Enter'||ev.key==='=') calculate(f);
      else if(ev.key==='Escape') clearAll(f);
    });
  </script>
</body>
</html>
